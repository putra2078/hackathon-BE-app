version: '3.8'

services:
  backend:
    build: .
    container_name: hackathon-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    restart: always

  redis:
    image: redis:alpine
    container_name: hackathon-redis
    ports:
      - "6379:6379"
    restart: always
